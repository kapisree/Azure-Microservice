name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  quality-gates:
    name: Quality gates (dotnet + Dafny + governance)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install Dafny (release zip bundles the Z3 solver)
        run: |
          curl -sSL -o "$RUNNER_TEMP/dafny.zip" \
            https://github.com/dafny-lang/dafny/releases/download/v4.9.1/dafny-4.9.1-x64-ubuntu-20.04.zip
          echo "697ee703b39414b3904dc8c132e51481982f52205c1658f3374d313a284d43eb  $RUNNER_TEMP/dafny.zip" | sha256sum -c -
          unzip -q "$RUNNER_TEMP/dafny.zip" -d "$RUNNER_TEMP/dafny-dist"
          echo "$RUNNER_TEMP/dafny-dist/dafny" >> "$GITHUB_PATH"

      - name: Run quality gates
        run: bash scripts/run-quality-gates.sh
