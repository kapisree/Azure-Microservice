name: Deploy Claims API to Container Apps

on:
  push:
    branches: [main]
    paths:
      - 'src/ClaimsApi/**'
      - '.github/workflows/deploy-containerapp.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR Login
        run: az acr login --name claimsapiacr

      - name: Build and push image
        run: |
          IMAGE=claimsapiacr.azurecr.io/claims-api:${{ github.sha }}
          docker build -f src/ClaimsApi/Dockerfile -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Update Container App
        run: |
          az containerapp update \
            --name claims-api \
            --resource-group rg-claimsapi \
            --image claimsapiacr.azurecr.io/claims-api:${{ github.sha }} \
            --set-env-vars ASPNETCORE_ENVIRONMENT=Production
