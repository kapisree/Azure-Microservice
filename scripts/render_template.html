<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<style>
:root {
  --color-bg:#171614; --color-surface:#1c1b19; --color-text:#cdccca;
  --color-error:#d163a7; --color-error-bg:#4c3d46;
  --color-gold:#e8af34; --color-gold-bg:#4d4332;
  --color-blue:#5591c7; --color-blue-bg:#3a4550;
  --color-primary:#4f98a3;
  font-family: -apple-system, BlinkMacSystemFont, "Inter", system-ui, sans-serif;
}
body { background: var(--color-bg); color: var(--color-text); padding: 2rem; line-height: 1.6; max-width: 80ch; margin: auto; }
h1 { border-bottom: 1px solid #393836; padding-bottom: .5rem; }
h2 { color: var(--color-primary); margin-top: 2rem; }
h3 { text-transform: uppercase; letter-spacing: .05em; font-size: .85rem; color: var(--color-primary); }
code { background: #201f1d; padding: 0 .25rem; border-radius: 3px; font-family: "JetBrains Mono", monospace; }
.risk { color: var(--color-error); font-weight: 600; background: var(--color-error-bg); padding: 0 .25rem; border-radius: 3px; }
.assumption { color: var(--color-gold); background: var(--color-gold-bg); padding: 0 .25rem; border-radius: 3px; }
.decision { color: var(--color-blue); background: var(--color-blue-bg); padding: 0 .25rem; border-radius: 3px; }
.risk-box { background: var(--color-error-bg); border: 1px solid var(--color-error); border-radius: .375rem; padding: .75rem 1rem; margin: 1rem 0; }
.risk-box-t { font-weight: 700; color: var(--color-error); margin-bottom: .25rem; }
.assum-box { background: var(--color-gold-bg); border: 1px solid var(--color-gold); border-radius: .375rem; padding: .75rem 1rem; margin: 1rem 0; }
.assum-box-t { font-weight: 700; color: var(--color-gold); margin-bottom: .25rem; }
.decision-box { background: var(--color-blue-bg); border: 1px solid var(--color-blue); border-radius: .375rem; padding: .75rem 1rem; margin: 1rem 0; }
.decision-box-t { font-weight: 700; color: var(--color-blue); margin-bottom: .25rem; }
ul { padding-left: 1.5rem; } li { margin-bottom: .25rem; }
</style>
</head><body>
<!-- BEGIN-CONTENT -->
{{CONTENT}}
<!-- END-CONTENT -->
</body></html>
